<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Thể loại - Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
        <div class="main-content">
        <div class="content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h1>Quản lý Thể loại sách</h1>
                <button class="btn btn-blue" onclick="openModal()">
                    <i class="fas fa-plus"></i> Thêm Thể loại
                </button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên thể loại</th>
                            <th style="width: 150px;">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="categoryTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="categoryModal" class="modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
        <div class="modal-content" style="background:white; padding:20px; border-radius:8px; width:400px; max-width:90%;">
            <h3 id="modalTitle" style="margin-top:0;">Thêm Thể loại</h3>
            
            <form id="categoryForm" onsubmit="handleSave(event)">
                <input type="hidden" id="catId"> <div class="form-group" style="margin-bottom:15px;">
                    <label>Tên thể loại:</label>
                    <input type="text" id="catName" class="form-control" required placeholder="Ví dụ: Tiểu thuyết, Kinh tế..." style="width:100%; padding:8px; margin-top:5px;">
                </div>

                <div style="text-align:right;">
                    <button type="button" class="btn btn-red" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn btn-blue" id="btn-save">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="js/auth.js"></script> <script src="js/admin-layout.js"></script>
    <script src="js/manage_categories.js"></script>
</body>
</html>
